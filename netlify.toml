[build]
command = "npm run build"
publish = "dist"

[env.production]
  [env.production.build.environment]
  NODE_ENV = "production"

# Redirect API calls to the backend on Render
[[redirects]]
from = "/api/*"
to = "https://YOUR_RENDER_URL/api/:splat"
status = 200
force = false

# SPA routing
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
